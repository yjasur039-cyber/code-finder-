<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN Code Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.8s ease;
            overflow: hidden;
        }

        /* Yashil fon effekti */
        body.success {
            background-color: #112d1b;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            color: #e0e0e0;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-size: 20px;
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #00adb5;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00adb5;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #007c82;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .error-msg {
            color: #ff5252;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        /* Brute-force vizual qismi */
        .simulation-box {
            display: none;
            margin-top: 20px;
        }

        .current-combo {
            font-size: 48px;
            font-family: monospace;
            color: #00adb5;
            letter-spacing: 8px;
            margin: 15px 0;
        }

        .success-box {
            display: none;
            color: #39ea7c;
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            animation: pulse 1s infinite alternate;
        }

        /* Tepada o'ng burchakdagi tugma */
        .history-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #333;
            color: #ccc;
            border: 1px solid #444;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            width: auto;
            display: none;
        }

        .history-btn:hover {
            background: #444;
        }

        /* Kombinatsiyalar ro'yxati (Modal oyna) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 85%;
            max-width: 350px;
            max-height: 70vh;
            overflow-y: auto;
            text-align: left;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .close-btn {
            cursor: pointer;
            color: #ff5252;
            font-weight: bold;
        }

        .combo-item {
            font-family: monospace;
            padding: 4px 0;
            border-bottom: 1px solid #2a2a2a;
            color: #aaa;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="history-btn" id="historyBtn" onclick="toggleModal(true)">Kombinatsiyalar ketma-ketligi</button>

        <h2>Telefoningizning 4 xonali kodini kiriting:</h2>
        
        <input type="password" id="pinInput" maxlength="4" placeholder="••••" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <div class="error-msg" id="errorMsg">Xato! Iltimos, haqiqiy 4 xonali raqamli kodni kiriting.</div>
        
        <button id="startBtn" onclick="startSimulation()">Kod qidirishni boshlash</button>

        <div class="simulation-box" id="simBox">
            <p style="color: #888;">Kombinatsiyalar tekshirilmoqda...</p>
            <div class="current-combo" id="liveCombo">0000</div>
        </div>

        <div class="success-box" id="successBox">100% MOS KELDI! TOPILDI!</div>
    </div>

    <div class="modal" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Ishlatilgan kombinatsiyalar</h3>
                <span class="close-btn" onclick="toggleModal(false)">X</span>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let triedCombinations = [];
        let simulationInterval;

        function startSimulation() {
            const pinInput = document.getElementById('pinInput');
            const errorMsg = document.getElementById('errorMsg');
            const startBtn = document.getElementById('startBtn');
            const simBox = document.getElementById('simBox');
            const liveCombo = document.getElementById('liveCombo');
            const successBox = document.getElementById('successBox');
            const historyBtn = document.getElementById('historyBtn');
            
            let userPin = pinInput.value;

            // 1. Shartni tekshirish (Faqatgina 4 ta raqam bo'lishi shart, aldasa o'tmaydi)
            if (userPin.length !== 4 || isNaN(userPin)) {
                errorMsg.style.display = 'block';
                pinInput.style.borderColor = '#ff5252';
                return;
            }

            // Xatolik xabarini yopish va elementlarni sozlash
            errorMsg.style.display = 'none';
            pinInput.style.borderColor = '#333';
            pinInput.disabled = true;
            startBtn.disabled = true;
            simBox.style.display = 'block';
            successBox.style.display = 'none';
            historyBtn.style.display = 'none';
            document.body.classList.remove('success');

            // Ma'lumotlarni tozalash
            triedCombinations = [];
            let currentCheck = 0;
            let targetPin = parseInt(userPin, 10);

            // Tezlikni sozlash (1 daqiqadan kamroq vaqt ichida yetib borishi uchun)
            // Har 1 millisekundda bitta kombinatsiya tekshiriladi
            simulationInterval = setInterval(() => {
                // Raqamni 4 xonali ko'rinishga keltirish (masalan: 5 -> "0005")
                let formattedCombo = currentCheck.toString().padStart(4, '0');
                
                // Ekrandagi raqamni yangilash
                liveCombo.innerText = formattedCombo;
                
                // Tarixga qo'shish
                triedCombinations.push(formattedCombo);

                // Agar kod to'g'ri kelsa (100% moslik)
                if (currentCheck === targetPin) {
                    clearInterval(simulationInterval);
                    
                    // Effektlarni ishga tushirish
                    document.body.classList.add('success'); // Yashil fon
                    successBox.style.style = 'block';
                    successBox.style.display = 'block';
                    historyBtn.style.display = 'block'; // Tarix tugmasini ko'rsatish
                    
                    // Tarix ro'yxatini shakllantirish
                    renderHistory();
                }

                currentCheck++;
            }, 1); 
        }

        // Tarix ro'yxatini modal ichiga yozish
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            triedCombinations.forEach((combo, index) => {
                let div = document.createElement('div');
                div.className = 'combo-item';
                div.innerText = `${index + 1}-urinish: ${combo}`;
                historyList.appendChild(div);
            });
        }

        // Modal oynani ochish/yopish
        function toggleModal(show) {
            const modal = document.getElementById('historyModal');
            modal.style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
